server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # index.html nunca se cachea — así el browser siempre baja el bundle más reciente
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Archivos con hash en el nombre (Angular los genera con contenido único)
    # Se pueden cachear indefinidamente
    location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|webp)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}